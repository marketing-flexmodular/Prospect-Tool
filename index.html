
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bloom Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'Helvetica', 'Arial', 'sans-serif'],
            },
            colors: {
              nexus: {
                bg: '#fffefb',
                surface: '#fffefb',
                sidebar: '#000000',
                sidebarHover: '#2e1f1f',
                input: '#fffefb',
                slate: '#8a8278',
                primary: '#ba0c2f',
                royal: '#ba0c2f',
                dark: '#000000',
                border: '#c5b8a8',
                accent: '#f9e6ea',
                gold: '#c9a046',
                goldLight: '#d4b366',
                crimsonLight: '#d4143a',
                crimsonDark: '#8a0923',
                sand: '#c5b8a8',
                sandLight: '#ebe6dd',
                charcoal: '#36302a',
                warmGray: '#8a8278',
                offWhite: '#fffdf9',
              }
            },
            boxShadow: {
              'subtle': '0 1px 2px 0 rgba(32, 21, 21, 0.04)',
              'card': '0 1px 3px rgba(32, 21, 21, 0.06)',
              'card-hover': '0 4px 12px rgba(186, 12, 47, 0.08)',
              'float': '0 12px 24px rgba(32, 21, 21, 0.12)',
              'crimson-glow': '0 0 0 3px rgba(186, 12, 47, 0.12)',
            },
            animation: {
              fadeIn: 'fadeIn 0.3s ease-out',
              slideIn: 'slideIn 0.3s ease-out',
              shimmer: 'shimmer 2s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(4px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideIn: {
                '0%': { transform: 'translateX(100%)', opacity: '0' },
                '100%': { transform: 'translateX(0)', opacity: '1' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%) skewX(-12deg)' },
                '100%': { transform: 'translateX(200%) skewX(-12deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fffefb;
        color: #000000;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom Scrollbar — Warm Sand */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #c5b8a8;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #8a8278;
      }
      /* Smooth focus rings */
      *:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(186, 12, 47, 0.12);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
